name: Redline Document Check

on:
  push:
    paths:
      - "input/**/*.docx"
      - "scripts/**"
      - ".github/workflows/redline-check.yml"
      - "requirements.txt"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  extract-redlines:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Extract redline changes
        run: python scripts/extract_redlines.py input output/redline_report.txt

      - name: Upload redline report
        uses: actions/upload-artifact@v4
        with:
          name: redline-report
          path: output/redline_report.txt
